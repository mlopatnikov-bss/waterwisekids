<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg-baby" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="url(#bg-baby)"/>
  <!-- Calendar body -->
  <rect x="11" y="16" width="26" height="20" rx="3" fill="white" opacity="0.9"/>
  <!-- Calendar top bar -->
  <rect x="11" y="13" width="26" height="6" rx="3" fill="white" opacity="0.6"/>
  <!-- Calendar rings -->
  <rect x="17" y="10" width="3" height="6" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="28" y="10" width="3" height="6" rx="1.5" fill="white" opacity="0.85"/>
  <!-- Checkmark / milestone mark inside calendar -->
  <polyline points="18,27 22,31 30,22" fill="none" stroke="#0284c7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
