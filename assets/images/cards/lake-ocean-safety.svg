  <line x1="60" y1="67" x2="48" y2="75" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="67" x2="72" y2="62" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Kids playing in water -->
