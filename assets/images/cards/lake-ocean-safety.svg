      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="300" height="180" fill="url(#bg)"/>
  
  <!-- Beach/shore line -->
  <path d="M0 100 Q75 85 150 95 T300 90" fill="rgba(255,255,255,0.15)"/>
  <path d="M0 105 Q36.0 97 75.0 105 T150.0 105 T225.0 105 T300 105" stroke="rgba(255,255,255,0.3)" fill="none" stroke-width="2"/>
    <path d="M0 113 Q36.0 105 75.0 113 T150.0 113 T225.0 113 T300 113" stroke="rgba(255,255,255,0.2)" fill="none" stroke-width="1.5"/>
  <!-- Parent standing on shore watching -->
