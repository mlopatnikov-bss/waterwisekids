  <line x1="160" y1="97" x2="170" y2="88" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="210" cy="95" r="5" fill="white" opacity="0.9"/>
  <path d="M0 130 Q36.0 122 75.0 130 T150.0 130 T225.0 130 T300 130" stroke="rgba(255,255,255,0.3)" fill="none" stroke-width="2"/>
    <path d="M0 138 Q36.0 130 75.0 138 T150.0 138 T225.0 138 T300 138" stroke="rgba(255,255,255,0.2)" fill="none" stroke-width="1.5"/>

