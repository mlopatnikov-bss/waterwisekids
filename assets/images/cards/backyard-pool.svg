<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="300" height="180" fill="url(#bg)"/>
  
  <!-- Pool shape -->
  <rect x="80" y="70" width="180" height="90" rx="20" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <path d="M0 90 Q21.599999999999998 82 45.0 90 T90.0 90 T135.0 90 T180 90" stroke="rgba(255,255,255,0.3)" fill="none" stroke-width="2"/>
    <path d="M0 98 Q21.599999999999998 90 45.0 98 T90.0 98 T135.0 98 T180 98" stroke="rgba(255,255,255,0.2)" fill="none" stroke-width="1.5"/>
  <!-- Fence on left -->
  <line x1="15" y1="30" x2="15" y2="130" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="40" y1="30" x2="40" y2="130" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="65" y1="30" x2="65" y2="130" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="10" y1="50" x2="70" y2="50" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="10" y1="80" x2="70" y2="80" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Parent in pool with child -->
  <circle cx="150" cy="75" r="8" fill="white"/>
  <ellipse cx="150" cy="95" rx="9" ry="6" fill="white" opacity="0.7"/>
  <circle cx="180" cy="80" r="5" fill="white"/>
  <ellipse cx="180" cy="92" rx="6" ry="4" fill="white" opacity="0.7"/>

</svg>