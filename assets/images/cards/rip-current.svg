<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="300" height="180" fill="url(#bg)"/>
  
  <path d="M0 80 Q36.0 72 75.0 80 T150.0 80 T225.0 80 T300 80" stroke="rgba(255,255,255,0.3)" fill="none" stroke-width="2"/>
    <path d="M0 88 Q36.0 80 75.0 88 T150.0 88 T225.0 88 T300 88" stroke="rgba(255,255,255,0.2)" fill="none" stroke-width="1.5"/>
  <!-- Rip current arrows pointing out -->
  <line x1="130" y1="140" x2="130" y2="70" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <line x1="150" y1="145" x2="150" y2="75" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <line x1="170" y1="140" x2="170" y2="70" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <polygon points="130,70 125,80 135,80" fill="rgba(255,255,255,0.4)"/>
  <polygon points="150,75 145,85 155,85" fill="rgba(255,255,255,0.4)"/>
  <polygon points="170,70 165,80 175,80" fill="rgba(255,255,255,0.4)"/>
  <!-- Escape arrows to the side -->
  <line x1="150" y1="100" x2="230" y2="100" stroke="white" stroke-width="3"/>
  <polygon points="230,100 220,95 220,105" fill="white"/>
  <!-- Person swimming to side -->
  <circle cx="210" cy="88" r="6" fill="white"/>
  <ellipse cx="220" cy="92" rx="12" ry="5" fill="white" opacity="0.8"/>
  <path d="M0 120 Q36.0 112 75.0 120 T150.0 120 T225.0 120 T300 120" stroke="rgba(255,255,255,0.3)" fill="none" stroke-width="2"/>
    <path d="M0 128 Q36.0 120 75.0 128 T150.0 128 T225.0 128 T300 128" stroke="rgba(255,255,255,0.2)" fill="none" stroke-width="1.5"/>

